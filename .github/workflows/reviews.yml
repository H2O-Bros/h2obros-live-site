name: Sync Google Reviews

on:
  schedule:
    - cron: '0 9 * * *'      # every day ~5am ET
  workflow_dispatch:           # allows a manual run from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest Google reviews
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
        run: node scripts/fetch-reviews.js

      - name: Commit if reviews changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reviews.json
          if git diff --cached --quiet; then
            echo "No review changes."
          else
            git commit -m "Update Google reviews"
            git push
          fi
